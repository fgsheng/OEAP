server:
  port: 8080

spring:
  application:
    name: oeap-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/oeap
    username: oeap
    password: oeap_password
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: oeap_password

management:
  endpoints:
    web:
      exposure:
        include: health,info
